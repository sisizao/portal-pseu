<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preview - PSEU Visual Assets</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #050307; color: #ece2cb; font-family: Inter, sans-serif; }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 32px; }
    h1 { margin-bottom: 16px; font-size: 2rem; letter-spacing: 0.12em; text-transform: uppercase; color: #f4efe4; }
    .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card { background: rgba(15, 10, 16, 0.92); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 18px; }
    .card h2 { margin: 0 0 12px; font-size: 1rem; color: #d9c38c; }
    .card a { display: block; width: 100%; height: 0; padding-bottom: 56.25%; position: relative; overflow: hidden; border-radius: 18px; background: #040306; }
    .card a img, .card a iframe { position: absolute; width: 100%; height: 100%; inset: 0; object-fit: cover; }
    .note { margin-top: 10px; color: #a99e8b; font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PSEU Visual Assets</h1>
    <div class="grid">
      <div class="card">
        <h2>Portal Entry 16:9</h2>
        <a href="portal-entry-16x9.svg" target="_blank"><img src="portal-entry-16x9.svg" alt="Portal Entry 16x9"></a>
      </div>
      <div class="card">
        <h2>Portal Entry 9:16</h2>
        <a href="portal-entry-9x16.svg" target="_blank"><img src="portal-entry-9x16.svg" alt="Portal Entry 9x16"></a>
      </div>
      <div class="card">
        <h2>Smoke Overlay</h2>
        <a href="smoke-overlay.svg" target="_blank"><img src="smoke-overlay.svg" alt="Smoke Overlay"></a>
      </div>
      <div class="card">
        <h2>Logo Glow</h2>
        <a href="logo-glow.svg" target="_blank"><img src="logo-glow.svg" alt="Logo Glow"></a>
      </div>
      <div class="card">
        <h2>VSL Main 16:9</h2>
        <a href="vsl-main-16x9.svg" target="_blank"><img src="vsl-main-16x9.svg" alt="VSL Main 16x9"></a>
      </div>
      <div class="card">
        <h2>VSL Main 9:16</h2>
        <a href="vsl-main-9x16.svg" target="_blank"><img src="vsl-main-9x16.svg" alt="VSL Main 9x16"></a>
      </div>
      <div class="card">
        <h2>VSL Offer 16:9</h2>
        <a href="vsl-offer-16x9.svg" target="_blank"><img src="vsl-offer-16x9.svg" alt="VSL Offer 16x9"></a>
      </div>
      <div class="card">
        <h2>VSL Offer 9:16</h2>
        <a href="vsl-offer-9x16.svg" target="_blank"><img src="vsl-offer-9x16.svg" alt="VSL Offer 9x16"></a>
      </div>
    </div>
    <p class="note">Abra arquivos SVG em tela cheia para avaliar a resolução e o estilo premium.</p>
  </div>
</body>
</html>
